let lang='es',answers={},order=[];
function setLang(l){lang=l;document.documentElement.lang=l;answers={};applyTranslations();buildPhases();document.getElementById('langSwitch').classList.remove('hidden');go('s0');}
function toggleLang(){const cur=document.querySelector('.screen.active').id;setLang(lang==='es'?'en':'es');
  // try to return to same logical screen
  if(['s0','s1','sRitual','sMap','sUmbral'].includes(cur)){if(cur==='sMap')buildMap();go(cur);}
  else{go('s0');}}
function applyTranslations(){const t=T[lang];document.querySelectorAll('[data-t]').forEach(el=>{const k=el.getAttribute('data-t');if(typeof t[k]==='string')el.innerHTML=t[k];});const rs=document.getElementById('ritualSteps');rs.innerHTML='';t.ritualSteps.forEach((s,i)=>{const d=document.createElement('div');d.className='ritual-step';d.innerHTML='<div class="ritual-num">'+(i+1)+'</div><div class="ritual-text"><b>'+s[0]+'</b> '+s[1]+'</div>';rs.appendChild(d);});document.getElementById('waitlist1').href=WAITLIST_URL;document.getElementById('waitlist2').href=WAITLIST_URL;}
function buildPhases(){const c=document.getElementById('phaseContainer');c.innerHTML='';order=['sLang','s0','s1'];PHASES[lang].forEach(p=>order.push(p.id));order.push('sRitual','sMap','sUmbral');const t=T[lang];PHASES[lang].forEach(p=>{const sec=document.createElement('section');sec.className='screen';sec.id=p.id;sec.style.setProperty('--accent',p.accent);sec.innerHTML='<div class="phase-tag" style="color:'+p.accent+'">'+p.taino+'</div><div class="phase-num">'+p.num+'</div><div class="phase-glyph">'+p.glyph+'</div><div class="phase-name">'+p.name+'</div><div class="phase-desc">'+p.desc+'</div><div class="question">'+p.q+'</div><div class="question-hint">'+p.hint+'</div><textarea id="ta_'+p.id+'" placeholder="'+t.writePlaceholder+'" style="--accent:'+p.accent+'"></textarea><div class="insight" id="ins_'+p.id+'" style="--accent:'+p.accent+'"><span class="insight-label">'+t.insightLabel+'</span>'+p.insight+'</div><div class="science-note">'+p.science+'</div><div class="btn-row"><button class="btn btn-ghost" id="reveal_'+p.id+'" onclick="reveal(\''+p.id+'\')">'+t.revealBtn+'</button><button class="btn btn-primary hidden" id="next_'+p.id+'" onclick="saveAndNext(\''+p.id+'\')">'+t.continueBtn+'</button></div>';c.appendChild(sec);});}
function go(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo({top:0,behavior:'smooth'});updateProgress(id);}
function reveal(pid){answers[pid]=document.getElementById('ta_'+pid).value.trim();document.getElementById('ins_'+pid).classList.add('show');document.getElementById('reveal_'+pid).classList.add('hidden');document.getElementById('next_'+pid).classList.remove('hidden');}
function saveAndNext(pid){const i=order.indexOf(pid);go(order[i+1]);}
function updateProgress(id){const pw=document.getElementById('progressWrap');const ph=PHASES[lang];const idx=ph.findIndex(p=>p.id===id);const t=T[lang];if(idx>=0){pw.classList.remove('hidden');const pct=Math.round(((idx+1)/ph.length)*100);document.getElementById('progBar').style.width=pct+'%';document.getElementById('progPct').textContent=pct+'%';document.getElementById('progLabel').textContent=ph[idx].name;}else if(['sRitual','sMap','sUmbral'].includes(id)){pw.classList.remove('hidden');document.getElementById('progBar').style.width='100%';document.getElementById('progPct').textContent='100%';document.getElementById('progLabel').textContent=id==='sRitual'?t.ritualKicker:id==='sMap'?t.mapKicker:t.umbralKicker;}else pw.classList.add('hidden');}
function buildMap(){const wrap=document.getElementById('mapEntries');wrap.innerHTML='';const t=T[lang];PHASES[lang].forEach(p=>{const a=answers[p.id]||'';const div=document.createElement('div');div.className='map-entry';div.innerHTML='<div class="map-phase" style="color:'+p.accent+'">'+p.glyph+' '+p.taino+' · '+p.name+'</div><div class="map-q">'+p.q+'</div><div class="map-a">'+(esc(a)||'<em style="color:#8a8070">'+t.silence+'</em>')+'</div>';wrap.appendChild(div);});}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function downloadMap(){const t=T[lang];let rows='';PHASES[lang].forEach(p=>{const a=esc(answers[p.id]||t.silence);rows+='<div style="border:1px solid #d4a57440;border-radius:12px;padding:18px 20px;margin-bottom:14px;background:#ffffff05;"><div style="font-family:sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:'+p.accent+';margin-bottom:8px;">'+p.glyph+' '+p.taino+' · '+p.name+'</div><div style="font-style:italic;color:#8a8070;font-size:14px;margin-bottom:6px;">'+p.q+'</div><div style="color:#f0ead6;font-size:16px;line-height:1.5;">'+a+'</div></div>';});const title=lang==='es'?'Mi Mapa RAÍCES':'My RAÍCES Map';const sub=lang==='es'?'Mi descenso a la raíz':'My descent to the root';const quote=lang==='es'?'"No vine a darte respuestas que ya tienes.<br>Vine a ayudarte a escuchar lo que tu cuerpo,<br>tu sangre y tus ancestros ya saben."':'"I didn\'t come to give you answers you already have.<br>I came to help you hear what your body,<br>your blood, and your ancestors already know."';const date=new Date().toLocaleDateString(lang==='es'?'es-ES':'en-US',{day:'numeric',month:'long',year:'numeric'});const html='<!DOCTYPE html><html lang="'+lang+'"><head><meta charset="utf-8"><title>'+title+' · Shaterany.living</title><style>@import url(\'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap\');body{font-family:\'Cormorant Garamond\',Georgia,serif;background:linear-gradient(160deg,#0a0a0f,#0f1a12,#0d0a1a);color:#f0ead6;padding:50px 30px;max-width:680px;margin:0 auto;}h1{font-size:48px;font-weight:400;text-align:center;color:#D4A574;margin-bottom:8px;}.sub{text-align:center;font-style:italic;color:#c4b99a;margin-bottom:30px;}.q{text-align:center;font-style:italic;font-size:20px;color:#c4b99a;line-height:1.8;margin:30px 0;}.sig{text-align:center;color:#D4A574;letter-spacing:3px;margin-top:30px;font-family:sans-serif;font-size:13px;}.brand{text-align:center;font-family:sans-serif;font-size:10px;color:#8a8070;letter-spacing:4px;text-transform:uppercase;margin-top:24px;}@media print{body{background:#0a0a0f;-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style></head><body><h1>'+title+'</h1><div class="sub">'+sub+' · '+date+'</div>'+rows+'<div class="q">'+quote+'</div><div class="sig">— Shaterany</div><div class="brand">Shaterany.living · Método RAÍCES</div><scr'+'ipt>setTimeout(function(){window.print();},600);</scr'+'ipt></body></html>';const blob=new Blob([html],{type:'text/html'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=(lang==='es'?'Mi_Mapa_RAICES':'My_RAICES_Map')+'.html';a.click();setTimeout(function(){URL.revokeObjectURL(url);},2000);window.open(url,'_blank');}
